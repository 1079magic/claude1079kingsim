<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Troops &amp; Stats • KingSim</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tell the browser that this page is dark  -->
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f1a">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0b0f1a"><!-- keep dark always -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Base then Theme (order matters) -->
  <link rel="stylesheet" href="assets/fonts.css" />
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="stylesheet" href="assets/theme-all.css" />
  <link rel="stylesheet" href="assets/anim-all.css" />
  <link rel="stylesheet" href="assets/mobile-all.css" />

  <!-- Page polish (scoped to Troops) -->
  <style>
    body { background: var(--bg); color: var(--ink); }
    .page-spacer { height: 12px; } /* breathing room under nav */
    .container { max-width: 1180px; margin: 24px auto; padding: 0 16px; }
    .panel { margin-bottom: 16px; }
    .panel.panel-glass { padding: 14px; }
    .h2 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    .muted { color: var(--muted); }

    /* Grids (keep the legacy hook classes for stat_ocr.js) */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 980px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }

    /* Inputs on dark glass */
    input[type="number"], select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #2a3f5a;
      background: #0c1424cc;
      color: #e9eef7;
      outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    input[type="number"]:focus, select:focus {
      border-color: #3b5f86;
      box-shadow: 0 0 0 3px rgba(59,95,134,.25);
    }
    label { display:block; margin:8px 0 4px; color:#cdd6e8; font-size:.95rem }

    /* OCR host panels inherit glass look */
    .ocr-host { padding: 14px; border-radius: 12px; }
    .stats-troops-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media(max-width:700px){ .stats-troops-grid { grid-template-columns:1fr; } }

    /* Instant hover everywhere */
    a, .btn, .btn-ok, .btn-primary, .btn-secondary, .btn-outline,
    .nav .nav-links a, .brand, button {
      transition: color .12s ease, background-color .12s ease,
                  border-color .12s ease, box-shadow .12s ease, filter .12s ease;
    }
  
    /* v2 troop type accent lines */
    .grid-stats .panel:nth-child(1),
    [id*="inf"], .inf-block { border-left: 3px solid #f87171 !important; }
    [id*="cav"], .cav-block { border-left: 3px solid #f59e0b !important; }
    [id*="arc"], .arc-block { border-left: 3px solid #22d3ee !important; }

    /* stat sub-blocks */
    .stat-section-inf { border-left: 3px solid #f87171; padding-left: 10px; }
    .stat-section-cav { border-left: 3px solid #f59e0b; padding-left: 10px; }
    .stat-section-arc { border-left: 3px solid #22d3ee; padding-left: 10px; }

  </style>
</head>
<body>
  <!-- NAV -->
  <div class="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand"><span class="brand-badge"></span>KingSim</a>
      <div class="nav-links">
        <a href="index.html" data-tab="home">Home</a>
        <a href="troops.html" data-tab="troops">Troops &amp; Stats</a>
        <a href="heros.html" data-tab="heroes">Heroes</a>
        <a href="magic.html"  data-tab="magic">Bear Magic</a>
        <a href="optiona.html" data-tab="optiona">Bear Option‑A</a>
        <a href="mystic.html"  data-tab="mystic">Mystic Trials</a>
        <a href="pvp.html"     data-tab="pvp">PvP</a>
      </div>
    </div>
  </div>


  <div class="container">
    <section class="panel panel-glass">
      <div class="cta-band" style="text-align: center; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; font-size: 18px; justify-content: center; ">
        <a class="btn-terciary" href="magic.html">Bear Magic</a>
        <a class="btn-quaternary" href="optiona.html">Bear Option‑A</a>
      </div>
    </section>
    <section class="panel panel-glass">
      <h2 class="h2" style="text-align:center;margin-bottom:4px">🪖 Troop Stats Input 🪖</h2>
      <p style="text-align:center;color:var(--muted);font-size:.84rem;margin:0 0 16px">Used for 🐻 Bear Magic and Bear Option-A</p>

      <!-- Two-column: left=Stats, right=Troops -->
      <div class="stats-troops-grid">

        <!-- ── LEFT: STATS ── -->
        <div style="background:rgba(14,20,34,.55);border:1.5px solid #2a3f60;border-radius:12px;padding:14px">
          <div style="font-size:.72rem;font-weight:700;color:#7dd3fc;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px">
            📊 Stats
            <span style="font-size:.66rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Attack &amp; Lethality %</span>
          </div>
          <!-- OCR import zone (stat_ocr.js injects button here) -->
          <div id="troops_import_stats" aria-live="polite" style="margin-bottom:10px"></div>
          <!-- IMPORTANT: legacy hook class .grid-stats so stat_ocr.js can find this grid -->
          <div class="grid-3 grid-stats" style="grid-template-columns:1fr;gap:8px">
            <div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px">
              <div style="font-size:.7rem;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">⚔ Infantry</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
                <div><label for="inf_atk" style="font-size:.68rem;margin:0 0 2px">Attack %</label><input id="inf_atk" type="number" step="0.1" value="481.6" /></div>
                <div><label for="inf_let" style="font-size:.68rem;margin:0 0 2px">Lethality %</label><input id="inf_let" type="number" step="0.1" value="284.4" /></div>
              </div>
            </div>
            <div style="background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:8px">
              <div style="font-size:.7rem;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">🐴 Cavalry</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
                <div><label for="cav_atk" style="font-size:.68rem;margin:0 0 2px">Attack %</label><input id="cav_atk" type="number" step="0.1" value="501.3" /></div>
                <div><label for="cav_let" style="font-size:.68rem;margin:0 0 2px">Lethality %</label><input id="cav_let" type="number" step="0.1" value="325.4" /></div>
              </div>
            </div>
            <div style="background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:8px">
              <div style="font-size:.7rem;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">🏹 Archers</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
                <div><label for="arc_atk" style="font-size:.68rem;margin:0 0 2px">Attack %</label><input id="arc_atk" type="number" step="0.1" value="509.9" /></div>
                <div><label for="arc_let" style="font-size:.68rem;margin:0 0 2px">Lethality %</label><input id="arc_let" type="number" step="0.1" value="479.7" /></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── RIGHT: TROOPS ── -->
        <div style="background:rgba(14,20,34,.55);border:1.5px solid #2a3f60;border-radius:12px;padding:14px">
          <div style="font-size:.72rem;font-weight:700;color:#7dd3fc;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px">
            🪖 Troops
            <span style="font-size:.66rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Counts &amp; formation</span>
          </div>
          <!-- OCR import zone (stat_ocr.js injects button here) -->
          <div id="troops_import_troops" aria-live="polite" style="margin-bottom:10px"></div>
          <div style="margin-bottom:10px">
            <label for="troopTier" style="font-size:.72rem;margin:0 0 3px">Troop Tier</label>
            <select id="troopTier">
              <option value="T6">T6</option><option value="T9">T9</option><option value="T10">T10</option>
              <option value="T10.TG1" selected>T10.TG1</option><option value="T10.TG2">T10.TG2</option>
              <option value="T10.TG3">T10.TG3</option><option value="T10.TG4">T10.TG4</option>
              <option value="T10.TG5">T10.TG5</option>
            </select>
          </div>
          <!-- IMPORTANT: legacy hook class .grid-tro so stat_ocr.js can find this grid -->
          <div class="grid-2 grid-tro" style="grid-template-columns:1fr 1fr;gap:12px">
            <div style="background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:8px">
              <div style="font-size:.7rem;font-weight:700;color:#10b981;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">📦 Stock</div>
              <label for="stockInf" style="font-size:.68rem;margin:0 0 2px">Infantry</label><input id="stockInf" type="number" min="0" value="211539" />
              <label for="stockCav" style="font-size:.68rem;margin:4px 0 2px">Cavalry</label><input id="stockCav" type="number" min="0" value="191128" />
              <label for="stockArc" style="font-size:.68rem;margin:4px 0 2px">Archers</label><input id="stockArc" type="number" min="0" value="312493" />
            </div>
            <div style="background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.2);border-radius:8px;padding:8px">
              <div style="font-size:.7rem;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">⚙ Formation</div>
              <label for="rallySize" style="font-size:.68rem;margin:0 0 2px">Rally size</label><input id="rallySize" type="number" min="0" value="134850" />
              <label for="marchSize" style="font-size:.68rem;margin:4px 0 2px">Join cap</label><input id="marchSize" type="number" min="0" value="65000" />
              <label for="numFormations" style="font-size:.68rem;margin:4px 0 2px"># Marches</label><input id="numFormations" type="number" min="1" value="6" />
            </div>
          </div>
        </div>

      </div><!-- end 2-col grid -->
    </section>
  </div>

  <!-- FOOTER AUTO-INSERT -->
  <script src="assets/footer.js"></script>
  <!-- OCR + state-sync (unchanged logic) -->
  <script src="stat_ocr.js"></script>
  <script src="assets/state-sync.js"></script>

  <!-- Shared theme behavior (active tab + ripple) -->
  <script src="assets/theme-all.js"></script>
  <script src="assets/anim-all.js"></script>
  <script src="assets/mobile-all.js"></script>
</body>
</html>
